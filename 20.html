<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星月落下花开的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(120deg, #e0f7ff, #fef6ff);
      padding: 40px 20px;
      text-align: center;
    }
    .box {
      background: white;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 30px;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }
    h1 {
      font-size: 28px;
      color: #2d3748;
      margin-bottom: 24px;
    }
    .nick {
      font-size: 22px;
      color: #3b82f6;
      margin: 12px 0;
      font-weight: 500;
    }
    .hobby {
      margin: 20px 0;
      color: #4b5563;
      font-size: 17px;
      line-height: 1.6;
    }
    .wish {
      margin-top: 30px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.7;
    }
    .back {
      display: inline-block;
      margin-top: 35px;
      color: #3b82f6;
      text-decoration: none;
      font-size: 15px;
    }
    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>我的小档案✨</h1>
    <div class="nick">昵称：星月落下花开</div>
    <div class="hobby">爱好：画画，唱歌</div>
    <div class="wish">毕业寄语：盛夏挥手告别往昔，愿你怀揣热忱奔赴前路。愿往后步履从容，心怀暖意，在崭新旅程里邂逅温柔风景，收获满心欢喜</div>
    <a href="index.html" class="back">← 返回纪念册首页</a>
  </div>
</body>
</html>
